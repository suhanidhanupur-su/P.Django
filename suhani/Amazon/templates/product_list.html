<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .product-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .product-card {
            background: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>All Products</h1>

    <div class="product-container">
        {% for product in products %}
        <div class="product-card">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
            
            <h3>{{ product.name }}</h3>
            <p class="price">₹{{ product.price }}</p>
            
            <p>{{ product.description }}</p>

            <p><strong>Category:</strong> {{ product.category.name }}</p>
        </div>
        {% endfor %}
    </div>

</body>
</html>
