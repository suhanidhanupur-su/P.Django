<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 50px auto;
        }
        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>

<h2>Student List</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
    </tr>
    <tr>
        <td>1</td>
        <td>Aman</td>
        <td>20</td>
        <td>BCA</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Neha</td>
        <td>21</td>
        <td>BBA</td>
    </tr>
    <tr>
        <td>3</td>
        <td>Ravi</td>
        <td>19</td>
        <td>BSc</td>
    </tr>
    <tr>
        <td>4</td>
        <td>Sneha</td>
        <td>22</td>
        <td>BA</td>
    </tr>
    <tr>
        <td>5</td>
        <td>Karan</td>
        <td>20</td>
        <td>BTech</td>
    </tr>
</table>

</body>
</html>
