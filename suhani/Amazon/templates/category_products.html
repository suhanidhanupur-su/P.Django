<!DOCTYPE html>
<html>
<head>
    <title>Categories & Products</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .category {
            margin-bottom: 40px;
        }

        .products {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 10px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            text-align: center;
        }

        img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
    </style>
</head>

<body>

<h1>Categories & Products</h1>

{% for category in categories %}
    <div class="category">
        <h2>{{ category.name }}</h2>

        <div class="products">
            {% for product in category.products.all %}
                <div class="card">
                    <img src="{{ product.image.url }}" alt="">
                    <h3>{{ product.name }}</h3>
                    <p>₹{{ product.price }}</p>
                </div>
            {% empty %}
                <p>No products in this category</p>
            {% endfor %}
        </div>
    </div>
{% endfor %}

</body>
</html>
