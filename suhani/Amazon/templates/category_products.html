<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products by Category</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .category {
            margin-bottom: 50px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .category-header img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .description {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

<h1>Category</h1>

{% for category in categories %}
<div class="category">

    <div class="category-header">
        {% if category.category_image %}
            <img src="{{ category.category_image.url }}" alt="{{ category.category_name }}">
        {% endif %}
        <h2>{{ category.category_name }}</h2>
    </div>

</div>
{% endfor %}

</body>
</html>
